<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('details').forEach(function(det) {
    det.addEventListener('toggle', function() {
      if (det.open && window.MathJax) {
        if (MathJax.Hub) {
          MathJax.Hub.Queue(["Typeset", MathJax.Hub, det]);
        } else if (MathJax.typesetPromise) {
          MathJax.typesetPromise([det]).catch(function(e) { console.error(e); });
        }
      }
    });
  });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Move "Table X.X:" span from end of caption to front
  document.querySelectorAll('caption').forEach(function(cap) {
    var span = cap.querySelector('span[id^="tab:"]');
    if (span) cap.insertBefore(span, cap.firstChild);
  });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Rewrite part labels and make them link to the part intro page
  document.querySelectorAll('.book-summary ul.summary li.part').forEach(function(partLi) {
    // Rewrite text: "I Mathematics Basics" -> "Part I: Mathematics Basics"
    var b = partLi.querySelector('span > b');
    if (b) {
      var m = b.textContent.match(/^([IVXLCDM]+)\s+([\s\S]*)/);
      if (m) b.textContent = 'Part ' + m[1] + ': ' + m[2];
    }
    // Make the part label link to the part intro page
    var nextEl = partLi.nextElementSibling;
    if (!nextEl || !nextEl.classList.contains('chapter')) return;
    var link = nextEl.querySelector('a');
    if (!link) return;
    var span = partLi.querySelector('span');
    if (!span) return;
    var a = document.createElement('a');
    a.href = link.getAttribute('href');
    a.innerHTML = span.innerHTML;
    partLi.replaceChild(a, span);
    // Hide the now-redundant part intro chapter entry in the sidebar
    nextEl.classList.add('part-intro-hidden');
  });
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {

    // --- Chapter-level collapse arrows (larger click target) ---
    document.querySelectorAll('.book-summary li.chapter').forEach(function(li) {
      var level = li.getAttribute('data-level') || '';
      if (level.indexOf('.') !== -1) return;

      var childUl = li.querySelector(':scope > ul');
      if (!childUl) return;

      var arrow = document.createElement('span');
      arrow.className = 'toc-arrow';
      arrow.style.cssText = [
        'cursor:pointer',
        'font-size:1.05em',
        'margin-left:6px',
        'display:inline-block',
        'width:1.8em',
        'height:1.8em',
        'line-height:1.8em',
        'text-align:center',
        'user-select:none',
        'vertical-align:middle',
        'border-radius:4px',
        'background:rgba(0,0,0,0.06)'
      ].join(';');

      function isVisible() {
        return window.getComputedStyle(childUl).display !== 'none';
      }
      function updateArrow() {
        arrow.textContent = isVisible() ? '▾' : '▸';
      }
      updateArrow();

      arrow.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        childUl.style.display = isVisible() ? 'none' : 'block';
        updateArrow();
      });

      var link = li.querySelector(':scope > a');
      if (link) link.appendChild(arrow);
    });

    // --- Part-level collapse arrows ---
    var summary = document.querySelector('.book-summary ul.summary');
    if (!summary) return;
    var items = Array.from(summary.children);

    items.forEach(function(li, idx) {
      if (!li.classList.contains('part')) return;

      var chapterItems = [];
      for (var j = idx + 1; j < items.length; j++) {
        if (items[j].classList.contains('part')) break;
        if (items[j].tagName === 'LI') chapterItems.push(items[j]);
      }
      if (chapterItems.length === 0) return;

      var partKey = 'partCollapsed_' + idx;
      var collapsed = localStorage.getItem(partKey) === '1';

      var arrow = document.createElement('span');
      arrow.className = 'toc-part-arrow';
      arrow.style.cssText = [
        'cursor:pointer',
        'font-size:1.05em',
        'display:inline-block',
        'width:1.8em',
        'height:1.8em',
        'line-height:1.8em',
        'text-align:center',
        'user-select:none',
        'vertical-align:middle',
        'border-radius:4px',
        'background:rgba(44,95,138,0.15)',
        'margin-left:6px',
        'float:right',
        'margin-right:6px'
      ].join(';');

      function updatePartArrow() {
        arrow.textContent = collapsed ? '▸' : '▾';
      }

      function applyCollapse() {
        chapterItems.forEach(function(ch) {
          ch.style.display = collapsed ? 'none' : '';
        });
      }

      if (collapsed) applyCollapse();
      updatePartArrow();

      arrow.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        collapsed = !collapsed;
        applyCollapse();
        updatePartArrow();
        localStorage.setItem(partKey, collapsed ? '1' : '0');
      });

      var target = li.querySelector('span') || li.querySelector('a');
      if (target) target.appendChild(arrow);
    });

  }, 150);
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Resizable sidebar via drag handle
  setTimeout(function() {
    var sidebar = document.querySelector('.book-summary');
    var bookBody = document.querySelector('.book-body');
    if (!sidebar || !bookBody) return;

    var handle = document.createElement('div');
    handle.className = 'sidebar-resize-handle';
    handle.title = 'Drag to resize sidebar';
    handle.style.cssText = [
      'position:absolute',
      'top:0',
      'right:0',
      'width:8px',
      'height:100%',
      'cursor:ew-resize',
      'z-index:10000',
      'border-right:3px solid transparent',
      'box-sizing:border-box',
      'transition:border-color 0.15s'
    ].join(';');

    sidebar.appendChild(handle);

    var isDragging = false;
    var startX = 0, startWidth = 0;
    var minW = 160, maxW = 650;

    handle.addEventListener('mouseenter', function() {
      handle.style.borderRightColor = 'rgba(44,95,138,0.5)';
    });
    handle.addEventListener('mouseleave', function() {
      if (!isDragging) handle.style.borderRightColor = 'transparent';
    });

    handle.addEventListener('mousedown', function(e) {
      isDragging = true;
      startX = e.clientX;
      startWidth = sidebar.offsetWidth;
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var newW = Math.max(minW, Math.min(maxW, startWidth + (e.clientX - startX)));
      sidebar.style.width = newW + 'px';
      bookBody.style.left = newW + 'px';
    });

    document.addEventListener('mouseup', function() {
      if (isDragging) {
        isDragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        handle.style.borderRightColor = 'transparent';
        localStorage.setItem('sidebarW', sidebar.offsetWidth);
      }
    });

    // Restore saved width
    var saved = parseInt(localStorage.getItem('sidebarW'), 10);
    if (saved && saved >= minW && saved <= maxW) {
      sidebar.style.width = saved + 'px';
      bookBody.style.left = saved + 'px';
    }
  }, 200);
});
</script>
