bookdown::gitbook:
  toc_depth: 2
  css: style.css
  includes:
    in_header: mathjax_config.html
  config:
    toc:
      collapse: section
      depth: 2
      before: |
        <li><a href="index.html">The Cheat Code</a></li>
      after: |
        <li></li>
    download: ["pdf", "epub"]
    edit: null
    sharing:
      github: yes
      facebook: no
      twitter: no
      linkedin: no
      weibo: no
      instapaper: no
      vk: no
  split_by: chapter
  number_sections: true
  self_contained: false
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  keep_tex: yes
bookdown::epub_book: default
